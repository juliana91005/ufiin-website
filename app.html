<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFIIN Community</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1:      #4D1840;   /* server list — dark brand */
      --bg2:      #ffffff;   /* main chat — white */
      --bg3:      #fdf0f9;   /* channel panel — light pink */
      --bg4:      #f5e0f0;   /* hover states */
      --bginput:  #fdf0f9;   /* message input */
      --accent:   #8C3085;   /* primary purple */
      --accenth:  #4D1840;   /* hover — dark */
      --bright:   #D99AC6;   /* light accent */
      --text1:    #4D1840;   /* primary text — dark */
      --text2:    #7a3870;   /* muted text */
      --text3:    #b880a8;   /* very muted */
      --border:   rgba(77,24,64,0.08);
      --online:   #00d084;
      --danger:   #cf2e2e;
      --radius:   2rem;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg1);
      color: var(--text1);
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCROLLBARS ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

    /* ── LOADING SCREEN ── */
    #loadingScreen {
      position: fixed; inset: 0;
      background: #ffffff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 1000;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--bg4);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #app { display: none; flex: 1; overflow: hidden; }
    #app.visible { display: flex; }

    /* ── SERVER LIST ── */
    .server-list {
      width: 72px;
      min-width: 72px;
      background: var(--bg1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 8px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }

    .server-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: white;
      cursor: pointer; flex-shrink: 0;
      transition: border-radius 0.2s, background 0.2s;
      user-select: none;
    }
    .server-icon:hover, .server-icon.active {
      border-radius: 30%;
      background: var(--accenth);
    }

    .server-divider {
      width: 32px; height: 2px;
      background: rgba(255,255,255,0.15); border-radius: 1px;
      flex-shrink: 0;
    }

    .server-icon-add {
      background: rgba(255,255,255,0.1);
      color: #D99AC6;
      font-size: 22px; font-weight: 300;
    }
    .server-icon-add:hover { background: #8C3085; color: white; }

    /* ── CHANNEL PANEL ── */
    .channel-panel {
      width: 240px; min-width: 240px;
      background: var(--bg3);
      display: flex; flex-direction: column;
    }

    .server-header {
      height: 48px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 15px;
      cursor: pointer; flex-shrink: 0;
      user-select: none;
      transition: background 0.1s;
    }
    .server-header:hover { background: rgba(255,255,255,0.03); }

    .channels-scroll {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 8px;
    }

    .ch-category {
      padding: 16px 12px 4px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text3);
      display: flex; align-items: center; justify-content: space-between;
    }

    .ch-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 8px; margin: 1px 8px;
      border-radius: 6px; cursor: pointer;
      color: var(--text3); font-size: 15px; font-weight: 500;
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }
    .ch-item:hover { background: rgba(255,255,255,0.06); color: var(--text2); }
    .ch-item.active { background: rgba(56,29,146,0.55); color: var(--text1); }

    .ch-hash { font-size: 19px; font-weight: 300; color: inherit; flex-shrink: 0; line-height: 1; }

    /* ── USER PANEL ── */
    .user-panel {
      height: 52px;
      background: var(--bg1);
      display: flex; align-items: center;
      padding: 0 8px; gap: 8px;
      flex-shrink: 0; border-top: 1px solid var(--border);
    }

    .avatar {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: white; flex-shrink: 0;
      position: relative; cursor: default;
    }

    .online-dot {
      position: absolute; bottom: -1px; right: -1px;
      width: 10px; height: 10px;
      background: var(--online); border-radius: 50%;
      border: 2px solid var(--bg1);
    }

    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-status { font-size: 11px; color: var(--text3); }

    .icon-btn {
      width: 28px; height: 28px; border-radius: 6px;
      background: none; border: none; color: var(--text3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .icon-btn:hover { background: var(--bg4); color: var(--accent); }

    /* ── MAIN CHAT ── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg2); min-width: 0;
    }

    .chat-header {
      height: 48px; padding: 0 16px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-hash { font-size: 22px; font-weight: 300; color: var(--text3); }
    .chat-name { font-weight: 700; font-size: 16px; }
    .chat-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .chat-desc { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── MESSAGES ── */
    .messages-wrap {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
    }

    .msg-spacer { flex: 1; }

    .channel-welcome {
      padding: 24px 20px 0;
      flex-shrink: 0;
    }

    .welcome-icon {
      width: 68px; height: 68px;
      background: var(--bg4); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin-bottom: 16px;
    }

    .welcome-title {
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.01em; margin-bottom: 8px;
    }

    .welcome-sub { font-size: 15px; color: var(--text3); }

    .date-sep {
      display: flex; align-items: center;
      padding: 16px 20px 8px; gap: 12px; flex-shrink: 0;
    }
    .date-sep-line { flex: 1; height: 1px; background: var(--border); }
    .date-sep-text { font-size: 12px; font-weight: 700; color: var(--text3); white-space: nowrap; }

    .msg-group {
      padding: 2px 20px;
      display: flex; gap: 16px;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .msg-group:hover { background: var(--bg3); }
    .msg-group.with-avatar { margin-top: 16px; }

    .msg-avatar {
      width: 40px; height: 40px;
      border-radius: 50%; flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: white;
    }

    .msg-avatar-gap { width: 40px; flex-shrink: 0; }

    .msg-body { flex: 1; min-width: 0; }

    .msg-header {
      display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px;
    }

    .msg-author { font-weight: 600; font-size: 15px; }
    .msg-time { font-size: 11px; color: var(--text3); }
    .msg-text {
      font-size: 15px; line-height: 1.4;
      color: var(--text2); word-wrap: break-word;
      white-space: pre-wrap;
    }

    /* ── INPUT ── */
    .input-area { padding: 0 20px 20px; flex-shrink: 0; }

    .input-wrap {
      background: var(--bginput);
      border-radius: 10px;
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
    }

    #msgInput {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--text1);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 13px 0;
      resize: none;
      max-height: 160px;
      line-height: 1.4;
    }
    #msgInput::placeholder { color: var(--text3); }

    .send-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--accent); border: none; color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
      transition: background 0.15s;
    }
    .send-btn:hover { background: var(--accenth); }

    /* ── MEMBER LIST ── */
    .member-list {
      width: 240px; min-width: 240px;
      background: var(--bg3);
      padding: 16px 8px;
      overflow-y: auto;
    }

    .member-section-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text3);
      padding: 0 8px; margin-bottom: 4px;
    }

    .member-item {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 8px; border-radius: 6px;
      cursor: pointer; margin-bottom: 2px;
      transition: background 0.1s;
    }
    .member-item:hover { background: var(--bg4); }

    .member-name {
      font-size: 14px; font-weight: 500; color: var(--text2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .member-name.is-me { color: var(--text1); }

    /* ── ADD CHANNEL BTN (in category header) ── */
    .add-ch-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 17px; font-weight: 300;
      padding: 0 2px; line-height: 1; border-radius: 3px;
      transition: color 0.1s;
    }
    .add-ch-btn:hover { color: var(--text1); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 12px;
      padding: 28px 28px 24px;
      width: 440px; max-width: calc(100vw - 40px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--text1); margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; line-height: 1.5; }
    .modal-label {
      display: block; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text3); margin-bottom: 8px;
    }
    .modal-input {
      width: 100%; background: var(--bginput);
      border: 1.5px solid var(--border); border-radius: 6px;
      padding: 10px 14px; font-family: 'Inter', sans-serif;
      font-size: 15px; color: var(--text1); outline: none; margin-bottom: 18px;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input::placeholder { color: var(--text3); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .modal-btn {
      padding: 9px 20px; border-radius: 6px; border: none;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-btn-cancel { background: var(--bg4); color: var(--text2); }
    .modal-btn-cancel:hover:not(:disabled) { background: #e8c8e0; }
    .modal-btn-create { background: var(--accent); color: white; }
    .modal-btn-create:hover:not(:disabled) { background: var(--accenth); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #cf2e2e; color: white;
      padding: 10px 20px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <div style="color:var(--text3);font-size:14px;">Connecting to UFIIN…</div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- App -->
  <div id="app">

    <!-- Server List -->
    <div class="server-list">
      <div class="server-icon active" title="UFIIN Community" style="padding:0;overflow:hidden;background:transparent;">
        <svg width="48" height="48" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="49" fill="#6b2062"/>
          <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
          <defs><path id="ring-a" d="M 10,50 a 40,40 0 1,1 80,0 a 40,40 0 1,1 -80,0"/></defs>
          <text font-family="'Inter',sans-serif" font-size="5" font-weight="700" fill="rgba(255,255,255,0.8)" letter-spacing="1.5">
            <textPath href="#ring-a" startOffset="24%">✦ UNIVERSITY FEMALE INVESTORS INT'L NETWORK</textPath>
          </text>
          <text x="50" y="47" text-anchor="middle" font-family="'Inter',sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="2">UFIIN</text>
          <text x="50" y="59" text-anchor="middle" font-family="Georgia,serif" font-size="5.5" font-style="italic" fill="rgba(255,255,255,0.7)">strength in numbers</text>
        </svg>
      </div>
      <div class="server-divider"></div>
      <div class="server-icon server-icon-add" id="addChannelBtn" title="Add a channel">+</div>
    </div>

    <!-- Channel Panel -->
    <div class="channel-panel">
      <div class="server-header">
        <span>UFIIN Community</span>
        <span style="font-size:20px;color:var(--text3);line-height:1;">⌄</span>
      </div>
      <div class="channels-scroll" id="channelsScroll"></div>
      <div class="user-panel">
        <div class="avatar" id="userAvatar" style="width:32px;height:32px;font-size:13px;">
          <div class="online-dot"></div>
        </div>
        <div class="user-info">
          <div class="user-name" id="userName">…</div>
          <div class="user-status">Online</div>
        </div>
        <button class="icon-btn" id="signOutBtn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header">
        <span class="chat-hash">#</span>
        <span class="chat-name" id="chatName">general</span>
        <div class="chat-sep"></div>
        <span class="chat-desc" id="chatDesc"></span>
      </div>

      <div class="messages-wrap" id="messagesWrap">
        <div class="msg-spacer"></div>
        <div class="channel-welcome" id="channelWelcome">
          <div class="welcome-icon">#</div>
          <div class="welcome-title" id="welcomeTitle">Welcome to #general!</div>
          <div class="welcome-sub" id="welcomeSub">This is the start of the #general channel.</div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea
            id="msgInput"
            placeholder="Message #general"
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" title="Send (Enter)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Member List -->
    <div class="member-list">
      <div class="member-section-title" style="margin-bottom:8px;">
        Online — <span id="onlineCount">0</span>
      </div>
      <div id="memberItems"></div>
    </div>

  </div><!-- #app -->

  <!-- Add Channel Modal -->
  <div class="modal-overlay" id="addChannelModal">
    <div class="modal">
      <div class="modal-title">Create a Channel</div>
      <div class="modal-sub">Channels are where the community comes together. Give yours a clear, lowercase name.</div>
      <label class="modal-label" for="newChannelName">Channel Name</label>
      <input class="modal-input" id="newChannelName" type="text" placeholder="e.g. investing-tips" maxlength="40" autocomplete="off">
      <label class="modal-label" for="newChannelCategory">Category</label>
      <input class="modal-input" id="newChannelCategory" type="text" placeholder="Text Channels" maxlength="40" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="cancelChannelBtn">Cancel</button>
        <button class="modal-btn modal-btn-create" id="confirmChannelBtn">Create Channel</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION — Replace with your Supabase project details
    // ============================================================
    const SUPABASE_URL = 'https://deegqrsblgcbvdatuaid.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_ux0RP7LLcrMFsJhL3AXwkA_C-92Zrh9'
    // ============================================================

    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ── State ──
    let currentUser    = null
    let currentProfile = null
    let currentChannel = null
    let channels       = []
    let messages       = []
    let onlineUsers    = new Map()
    let msgSub         = null
    let presenceCh     = null

    // ── Avatar helpers ──
    const COLORS = ['#381d92','#7a00df','#0693e3','#cf2e2e','#ff6900','#00d084','#fcb900','#9b51e0']

    function avatarColor(userId) {
      const n = [...userId].reduce((a, c) => a + c.charCodeAt(0), 0)
      return COLORS[n % COLORS.length]
    }

    function initials(name) {
      if (!name) return '?'
      return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2)
    }

    // ── Time helpers ──
    function fmtTime(iso) {
      const d = new Date(iso), now = new Date()
      const h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0')
      const ampm = h >= 12 ? 'PM' : 'AM'
      const h12 = h % 12 || 12
      const today = d.toDateString() === now.toDateString()
      const yest = (() => { const y = new Date(now); y.setDate(y.getDate()-1); return y.toDateString() })()
      const prefix = today ? 'Today' : d.toDateString() === yest ? 'Yesterday' : d.toLocaleDateString()
      return `${prefix} at ${h12}:${m} ${ampm}`
    }

    function fmtDate(iso) {
      const d = new Date(iso), now = new Date()
      if (d.toDateString() === now.toDateString()) return 'Today'
      const yest = new Date(now); yest.setDate(yest.getDate() - 1)
      if (d.toDateString() === yest.toDateString()) return 'Yesterday'
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
    }

    function escHtml(s) {
      const d = document.createElement('div')
      d.appendChild(document.createTextNode(s))
      return d.innerHTML
    }

    // ── Toast ──
    let toastTimer
    function showToast(msg) {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.classList.add('show')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
    }

    // ── INIT ──
    async function init() {
      const { data: { session }, error } = await sb.auth.getSession()
      if (!session) {
        window.location.href = 'login.html'
        return
      }
      currentUser = session.user

      await loadProfile()
      await loadChannels()
      setupPresence()

      document.getElementById('loadingScreen').style.display = 'none'
      document.getElementById('app').classList.add('visible')
    }

    // ── Profile ──
    async function loadProfile() {
      const { data } = await sb
        .from('profiles').select('*')
        .eq('id', currentUser.id).single()

      if (data) {
        currentProfile = data
      } else {
        const username = currentUser.email?.split('@')[0] || 'user'
        const { data: np } = await sb
          .from('profiles')
          .upsert({ id: currentUser.id, username })
          .select().single()
        currentProfile = np || { id: currentUser.id, username }
      }

      const color = avatarColor(currentUser.id)
      const ini   = initials(currentProfile?.username)
      const av    = document.getElementById('userAvatar')
      av.style.background = color
      av.innerHTML = `${ini}<div class="online-dot"></div>`
      document.getElementById('userName').textContent = currentProfile?.username || currentUser.email
    }

    // ── Channels ──
    async function loadChannels() {
      const { data } = await sb.from('channels').select('*').order('position')
      channels = data || []
      renderChannels()
      if (channels.length > 0) await selectChannel(channels[0])
    }

    function renderChannels() {
      const wrap = document.getElementById('channelsScroll')
      const cats = {}
      channels.forEach(ch => {
        if (!cats[ch.category]) cats[ch.category] = []
        cats[ch.category].push(ch)
      })

      wrap.innerHTML = ''
      for (const [cat, chs] of Object.entries(cats)) {
        const catEl = document.createElement('div')
        catEl.className = 'ch-category'
        catEl.innerHTML = `<span>${cat}</span><button class="add-ch-btn" title="Add channel to ${cat}">+</button>`
        catEl.querySelector('.add-ch-btn').addEventListener('click', e => {
          e.stopPropagation()
          openAddChannelModal(cat)
        })
        wrap.appendChild(catEl)

        chs.forEach(ch => {
          const el = document.createElement('div')
          el.className = 'ch-item' + (currentChannel?.id === ch.id ? ' active' : '')
          el.dataset.id = ch.id
          el.innerHTML = `<span class="ch-hash">#</span><span>${escHtml(ch.name)}</span>`
          el.addEventListener('click', () => selectChannel(ch))
          wrap.appendChild(el)
        })
      }
    }

    async function selectChannel(ch) {
      currentChannel = ch
      renderChannels()

      document.getElementById('chatName').textContent = ch.name
      document.getElementById('chatDesc').textContent = ch.description || ''
      document.getElementById('msgInput').placeholder = `Message #${ch.name}`
      document.getElementById('welcomeTitle').textContent = `Welcome to #${ch.name}!`
      document.getElementById('welcomeSub').textContent = `This is the start of the #${ch.name} channel.`

      await loadMessages()

      // Resubscribe
      if (msgSub) { await sb.removeChannel(msgSub); msgSub = null }
      subscribeMessages()
    }

    // ── Messages ──
    async function loadMessages() {
      const wrap = document.getElementById('messagesWrap')

      // Reset
      wrap.innerHTML = `
        <div class="msg-spacer"></div>
        <div class="channel-welcome" id="channelWelcome">
          <div class="welcome-icon">#</div>
          <div class="welcome-title" id="welcomeTitle">Welcome to #${escHtml(currentChannel.name)}!</div>
          <div class="welcome-sub" id="welcomeSub">This is the start of the #${escHtml(currentChannel.name)} channel.</div>
        </div>
      `

      const { data } = await sb
        .from('messages')
        .select('*, profiles(*)')
        .eq('channel_id', currentChannel.id)
        .order('created_at', { ascending: true })
        .limit(100)

      messages = data || []
      renderAllMessages()
    }

    function renderAllMessages() {
      const wrap = document.getElementById('messagesWrap')
      // Remove non-welcome nodes
      Array.from(wrap.children).forEach(c => {
        if (!c.classList.contains('msg-spacer') && !c.classList.contains('channel-welcome')) c.remove()
      })

      let lastDate = null, lastUser = null, lastTime = null

      messages.forEach(msg => {
        const d = fmtDate(msg.created_at)
        if (d !== lastDate) {
          if (lastDate !== null) wrap.appendChild(mkDateSep(d))
          lastDate = d
          lastUser = null
        }
        const timeDiff = lastTime ? (new Date(msg.created_at) - new Date(lastTime)) / 60000 : 999
        const grouped = lastUser === msg.user_id && timeDiff < 5
        wrap.appendChild(mkMsgEl(msg, !grouped))
        lastUser = msg.user_id
        lastTime = msg.created_at
      })

      scrollBottom()
    }

    function mkDateSep(label) {
      const el = document.createElement('div')
      el.className = 'date-sep'
      el.innerHTML = `
        <div class="date-sep-line"></div>
        <div class="date-sep-text">${label}</div>
        <div class="date-sep-line"></div>
      `
      return el
    }

    function mkMsgEl(msg, showAvatar) {
      const el = document.createElement('div')
      el.className = 'msg-group' + (showAvatar ? ' with-avatar' : '')
      el.dataset.msgId = msg.id

      const author = msg.profiles?.username || 'Unknown'
      const color  = avatarColor(msg.user_id)
      const ini    = initials(author)

      if (showAvatar) {
        el.innerHTML = `
          <div class="msg-avatar" style="background:${color};">${ini}</div>
          <div class="msg-body">
            <div class="msg-header">
              <span class="msg-author" style="color:${color};">${escHtml(author)}</span>
              <span class="msg-time">${fmtTime(msg.created_at)}</span>
            </div>
            <div class="msg-text">${escHtml(msg.content)}</div>
          </div>
        `
      } else {
        el.innerHTML = `
          <div class="msg-avatar-gap"></div>
          <div class="msg-body">
            <div class="msg-text">${escHtml(msg.content)}</div>
          </div>
        `
      }
      return el
    }

    function appendMsg(msg) {
      const wrap = document.getElementById('messagesWrap')
      const prev = messages[messages.length - 2]
      const timeDiff = prev ? (new Date(msg.created_at) - new Date(prev.created_at)) / 60000 : 999
      const showAvatar = !prev || prev.user_id !== msg.user_id || timeDiff >= 5
      wrap.appendChild(mkMsgEl(msg, showAvatar))
      scrollBottom()
    }

    function scrollBottom() {
      const wrap = document.getElementById('messagesWrap')
      wrap.scrollTop = wrap.scrollHeight
    }

    // ── Realtime messages ──
    function subscribeMessages() {
      msgSub = sb
        .channel(`msgs:${currentChannel.id}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: `channel_id=eq.${currentChannel.id}`
        }, async ({ new: raw }) => {
          if (messages.find(m => m.id === raw.id)) return
          const { data } = await sb
            .from('messages').select('*, profiles(*)')
            .eq('id', raw.id).single()
          if (data) { messages.push(data); appendMsg(data) }
        })
        .subscribe()
    }

    // ── Send message ──
    async function sendMessage() {
      const input = document.getElementById('msgInput')
      const content = input.value.trim()
      if (!content || !currentChannel) return

      input.value = ''
      autoResize(input)

      // Optimistic UI
      const tempId  = 'temp-' + Date.now()
      const tempMsg = {
        id: tempId, channel_id: currentChannel.id,
        user_id: currentUser.id, content,
        created_at: new Date().toISOString(),
        profiles: currentProfile
      }
      messages.push(tempMsg)
      appendMsg(tempMsg)

      const { data, error } = await sb
        .from('messages')
        .insert({ channel_id: currentChannel.id, user_id: currentUser.id, content })
        .select('*, profiles(*)').single()

      if (error) {
        showToast('Failed to send message.')
        messages = messages.filter(m => m.id !== tempId)
        document.querySelector(`[data-msg-id="${tempId}"]`)?.remove()
        return
      }

      // Swap temp → real
      const tempEl = document.querySelector(`[data-msg-id="${tempId}"]`)
      if (tempEl) tempEl.dataset.msgId = data.id
      messages = messages.map(m => m.id === tempId ? data : m)
    }

    // ── Presence ──
    function setupPresence() {
      presenceCh = sb.channel('ufiin:presence:v1')

      presenceCh
        .on('presence', { event: 'sync' }, () => {
          onlineUsers.clear()
          const state = presenceCh.presenceState()
          Object.values(state).forEach(arr => arr.forEach(p => onlineUsers.set(p.user_id, p)))
          renderMembers()
        })
        .on('presence', { event: 'join' }, ({ newPresences }) => {
          newPresences.forEach(p => onlineUsers.set(p.user_id, p))
          renderMembers()
        })
        .on('presence', { event: 'leave' }, ({ leftPresences }) => {
          leftPresences.forEach(p => onlineUsers.delete(p.user_id))
          renderMembers()
        })
        .subscribe(async status => {
          if (status === 'SUBSCRIBED') {
            await presenceCh.track({
              user_id:   currentUser.id,
              username:  currentProfile?.username || currentUser.email,
              online_at: new Date().toISOString()
            })
          }
        })
    }

    function renderMembers() {
      const container = document.getElementById('memberItems')
      const count = document.getElementById('onlineCount')
      const users = [...onlineUsers.values()]
      count.textContent = users.length

      // Sort: current user first, then alphabetical
      users.sort((a, b) => {
        if (a.user_id === currentUser.id) return -1
        if (b.user_id === currentUser.id) return 1
        return (a.username || '').localeCompare(b.username || '')
      })

      container.innerHTML = users.map(u => {
        const color = avatarColor(u.user_id)
        const ini   = initials(u.username)
        const isMe  = u.user_id === currentUser.id
        return `
          <div class="member-item">
            <div class="avatar" style="background:${color};width:32px;height:32px;font-size:13px;">
              ${ini}<div class="online-dot"></div>
            </div>
            <div class="member-name${isMe ? ' is-me' : ''}">${escHtml(u.username || 'Unknown')}${isMe ? ' (you)' : ''}</div>
          </div>
        `
      }).join('')
    }

    // ── Input auto-resize ──
    function autoResize(el) {
      el.style.height = 'auto'
      el.style.height = Math.min(el.scrollHeight, 160) + 'px'
    }

    // ── Event listeners ──
    document.getElementById('msgInput').addEventListener('input', function() {
      autoResize(this)
    })

    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        sendMessage()
      }
    })

    document.getElementById('sendBtn').addEventListener('click', sendMessage)

    document.getElementById('signOutBtn').addEventListener('click', async () => {
      if (confirm('Sign out of UFIIN Community?')) {
        if (presenceCh) await sb.removeChannel(presenceCh)
        await sb.auth.signOut()
        window.location.href = 'login.html'
      }
    })

    // ── Add Channel Modal ──
    function openAddChannelModal(presetCategory = '') {
      document.getElementById('newChannelName').value = ''
      document.getElementById('newChannelCategory').value = presetCategory
      document.getElementById('addChannelModal').classList.add('open')
      setTimeout(() => document.getElementById('newChannelName').focus(), 60)
    }

    document.getElementById('addChannelBtn').addEventListener('click', () => openAddChannelModal())

    document.getElementById('cancelChannelBtn').addEventListener('click', () => {
      document.getElementById('addChannelModal').classList.remove('open')
    })

    document.getElementById('addChannelModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open')
    })

    document.getElementById('newChannelName').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('confirmChannelBtn').click()
      if (e.key === 'Escape') document.getElementById('cancelChannelBtn').click()
    })

    document.getElementById('confirmChannelBtn').addEventListener('click', async () => {
      const raw = document.getElementById('newChannelName').value.trim()
      if (!raw) { document.getElementById('newChannelName').focus(); return }
      const name = raw.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '')
      if (!name) { showToast('Please use letters, numbers, or hyphens'); return }
      const category = document.getElementById('newChannelCategory').value.trim() || 'Text Channels'

      const btn = document.getElementById('confirmChannelBtn')
      btn.textContent = 'Creating…'
      btn.disabled = true

      const { data, error } = await sb.from('channels').insert({
        name, category, position: channels.length, description: ''
      }).select().single()

      btn.textContent = 'Create Channel'
      btn.disabled = false

      if (error) { showToast('Could not create channel — check permissions'); return }

      document.getElementById('addChannelModal').classList.remove('open')
      channels.push(data)
      renderChannels()
      await selectChannel(data)
    })

    // ── Start ──
    init()
  </script>
</body>
</html>
