<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFIIN Community</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ios-bg:        #f2f2f7;
      --ios-bg2:       #ffffff;
      --ios-sidebar:   #f2f2f7;
      --ios-blue:      #007AFF;
      --ios-blue-dark: #0056b3;
      --ios-green:     #34C759;
      --ios-gray:      #8e8e93;
      --ios-gray2:     #aeaeb2;
      --ios-gray3:     #c7c7cc;
      --ios-gray4:     #d1d1d6;
      --ios-gray5:     #e5e5ea;
      --ios-gray6:     #f2f2f7;
      --ios-label:     #000000;
      --ios-label2:    #3c3c43;
      --ios-label3:    #3c3c4399;
      --ios-sep:       rgba(60,60,67,0.12);
      --ios-fill:      rgba(120,120,128,0.12);
      --ios-fill2:     rgba(120,120,128,0.08);
      --ios-nav-h:     52px;
      --ios-radius:    13px;
      --ios-bubble-me: #007AFF;
      --ios-bubble-them: #e9e9eb;
      --online: #34C759;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--ios-bg);
      color: var(--ios-label);
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCROLLBARS ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ios-gray4); border-radius: 4px; }

    /* ── LOADING SCREEN ── */
    #loadingScreen {
      position: fixed; inset: 0;
      background: var(--ios-bg2);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 1000;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--ios-gray5);
      border-top-color: var(--ios-blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #app { display: none; flex: 1; overflow: hidden; }
    #app.visible { display: flex; }

    /* ── SERVER LIST (left rail) ── */
    .server-list {
      width: 68px;
      min-width: 68px;
      background: var(--ios-sidebar);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 12px;
      gap: 10px;
      border-right: 1px solid var(--ios-sep);
      overflow-y: auto;
    }

    .server-icon {
      width: 50px; height: 50px;
      border-radius: 16px;
      background: var(--ios-blue);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: white;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0,122,255,0.25);
    }
    .server-icon:active { transform: scale(0.93); opacity: 0.8; }
    .server-icon.active { box-shadow: 0 0 0 3px var(--ios-blue), 0 2px 8px rgba(0,122,255,0.3); }

    .server-divider {
      width: 28px; height: 1px;
      background: var(--ios-sep); border-radius: 1px;
      flex-shrink: 0;
    }

    .server-icon-add {
      background: var(--ios-fill);
      color: var(--ios-blue);
      font-size: 24px; font-weight: 300;
      box-shadow: none;
    }
    .server-icon-add:hover { background: var(--ios-gray5); }

    /* ── CHANNEL PANEL ── */
    .channel-panel {
      width: 240px; min-width: 240px;
      background: var(--ios-bg2);
      display: flex; flex-direction: column;
      border-right: 1px solid var(--ios-sep);
    }

    .server-header {
      height: var(--ios-nav-h); padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--ios-sep);
      font-weight: 700; font-size: 17px;
      cursor: default; flex-shrink: 0;
      user-select: none;
      letter-spacing: -0.3px;
    }

    .channels-scroll {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 8px;
    }

    .ch-category {
      padding: 20px 16px 6px;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--ios-gray);
      display: flex; align-items: center; justify-content: space-between;
    }

    .ch-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; margin: 1px 8px;
      border-radius: 10px; cursor: pointer;
      color: var(--ios-label2); font-size: 15px; font-weight: 400;
      transition: background 0.1s;
      user-select: none;
    }
    .ch-item:hover { background: var(--ios-fill2); }
    .ch-item.active { background: var(--ios-blue); color: #fff; }
    .ch-item.active .ch-hash { color: rgba(255,255,255,0.7); }

    .ch-hash { font-size: 16px; font-weight: 400; color: var(--ios-gray2); flex-shrink: 0; line-height: 1; }

    /* ── USER PANEL ── */
    .user-panel {
      height: 60px;
      background: var(--ios-bg2);
      display: flex; align-items: center;
      padding: 0 12px; gap: 10px;
      flex-shrink: 0; border-top: 1px solid var(--ios-sep);
    }

    .avatar {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; color: white; flex-shrink: 0;
      position: relative; cursor: default;
    }

    .online-dot {
      position: absolute; bottom: 0px; right: 0px;
      width: 10px; height: 10px;
      background: var(--online); border-radius: 50%;
      border: 2px solid var(--ios-bg2);
    }

    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--ios-label);
    }
    .user-status { font-size: 12px; color: var(--ios-green); font-weight: 500; }

    .icon-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--ios-fill); border: none; color: var(--ios-blue);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
      transition: background 0.1s;
    }
    .icon-btn:hover { background: var(--ios-gray5); }

    /* ── MAIN CHAT ── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column;
      background: var(--ios-bg2); min-width: 0;
    }

    .chat-header {
      height: var(--ios-nav-h); padding: 0 16px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--ios-sep);
      flex-shrink: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .chat-hash { font-size: 18px; font-weight: 300; color: var(--ios-gray2); }
    .chat-name { font-weight: 600; font-size: 17px; letter-spacing: -0.3px; }
    .chat-sep { width: 1px; height: 16px; background: var(--ios-sep); margin: 0 4px; }
    .chat-desc { font-size: 13px; color: var(--ios-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── MESSAGES ── */
    .messages-wrap {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
      padding: 0 0 8px;
    }

    .msg-spacer { flex: 1; }

    .channel-welcome {
      padding: 32px 20px 16px;
      flex-shrink: 0;
      text-align: center;
    }

    .welcome-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--ios-blue), #5ac8fa);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 16px;
      box-shadow: 0 4px 16px rgba(0,122,255,0.3);
      color: white; font-weight: 300;
    }

    .welcome-title {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.5px; margin-bottom: 6px;
    }

    .welcome-sub { font-size: 14px; color: var(--ios-gray); line-height: 1.5; }

    .date-sep {
      display: flex; align-items: center;
      padding: 16px 20px 8px; gap: 10px; flex-shrink: 0;
    }
    .date-sep-line { flex: 1; height: 1px; background: var(--ios-sep); }
    .date-sep-text { font-size: 12px; font-weight: 500; color: var(--ios-gray); white-space: nowrap; }

    /* iMessage-style bubbles */
    .msg-group {
      padding: 2px 16px;
      display: flex; gap: 10px;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .msg-group.with-avatar { margin-top: 12px; }

    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%; flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: white;
    }

    .msg-avatar-gap { width: 36px; flex-shrink: 0; }

    .msg-body { flex: 1; min-width: 0; }

    .msg-header {
      display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px;
    }

    .msg-author { font-weight: 600; font-size: 14px; color: var(--ios-label); }
    .msg-time { font-size: 11px; color: var(--ios-gray); }
    .msg-text {
      display: inline-block;
      background: var(--ios-bubble-them);
      color: var(--ios-label);
      font-size: 15px; line-height: 1.45;
      padding: 9px 14px;
      border-radius: 18px 18px 18px 4px;
      word-wrap: break-word;
      white-space: pre-wrap;
      max-width: 75%;
    }

    /* ── INPUT ── */
    .input-area {
      padding: 8px 16px 16px; flex-shrink: 0;
      border-top: 1px solid var(--ios-sep);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .input-wrap {
      background: var(--ios-gray6);
      border-radius: 22px;
      border: 1px solid var(--ios-gray4);
      display: flex; align-items: center; gap: 8px;
      padding: 0 8px 0 16px;
    }

    #msgInput {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--ios-label);
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 15px;
      padding: 11px 0;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }
    #msgInput::placeholder { color: var(--ios-gray2); }

    .send-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--ios-blue); border: none; color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.92); }

    /* ── MEMBER LIST ── */
    .member-list {
      width: 220px; min-width: 220px;
      background: var(--ios-bg);
      padding: 8px;
      overflow-y: auto;
      border-left: 1px solid var(--ios-sep);
    }

    .member-section-title {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--ios-gray);
      padding: 12px 8px 6px;
    }

    .member-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 10px;
      cursor: pointer; margin-bottom: 2px;
      transition: background 0.1s;
    }
    .member-item:hover { background: var(--ios-fill2); }

    .member-name {
      font-size: 14px; font-weight: 400; color: var(--ios-label2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .member-name.is-me { color: var(--ios-blue); font-weight: 600; }

    /* ── ADD CHANNEL BTN ── */
    .add-ch-btn {
      background: none; border: none; cursor: pointer;
      color: var(--ios-blue); font-size: 18px; font-weight: 300;
      padding: 0 2px; line-height: 1; border-radius: 4px;
      transition: opacity 0.1s;
    }
    .add-ch-btn:hover { opacity: 0.7; }

    /* ── MODAL (iOS alert style) ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(242,242,247,0.95);
      border-radius: 14px;
      padding: 24px 20px 16px;
      width: 400px; max-width: calc(100vw - 40px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--ios-label); margin-bottom: 4px; text-align: center; }
    .modal-sub { font-size: 13px; color: var(--ios-gray); margin-bottom: 20px; line-height: 1.5; text-align: center; }
    .modal-label {
      display: block; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--ios-gray); margin-bottom: 6px;
    }
    .modal-input {
      width: 100%; background: var(--ios-bg2);
      border: 1px solid var(--ios-gray4); border-radius: 10px;
      padding: 11px 14px;
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 15px; color: var(--ios-label); outline: none; margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: var(--ios-blue); }
    .modal-input::placeholder { color: var(--ios-gray2); }
    .modal-actions {
      display: flex; gap: 0; justify-content: stretch;
      margin-top: 4px; border-top: 1px solid var(--ios-sep); padding-top: 12px;
    }
    .modal-btn {
      flex: 1; padding: 10px; border-radius: 10px; border: none;
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
      margin: 0 4px;
    }
    .modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .modal-btn-cancel { background: var(--ios-gray5); color: var(--ios-label); }
    .modal-btn-cancel:hover:not(:disabled) { background: var(--ios-gray4); }
    .modal-btn-create { background: var(--ios-blue); color: white; font-weight: 600; }
    .modal-btn-create:hover:not(:disabled) { background: var(--ios-blue-dark); }

    /* ── @MENTIONS ── */
    .mention {
      background: rgba(0,122,255,0.12);
      color: var(--ios-blue);
      border-radius: 4px;
      padding: 1px 4px;
      font-weight: 600;
      cursor: pointer;
    }
    .mention-everyone {
      background: rgba(255,59,48,0.12);
      color: #ff3b30;
    }

    /* ── MESSAGE HOVER ACTIONS ── */
    .msg-group { position: relative; }
    .msg-actions {
      position: absolute; right: 16px; top: -14px;
      display: none;
      background: var(--ios-bg2);
      border: 1px solid var(--ios-sep);
      border-radius: 20px;
      padding: 4px 6px;
      gap: 2px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      z-index: 10;
      align-items: center;
    }
    .msg-group:hover .msg-actions { display: flex; }
    .msg-action-btn {
      background: none; border: none; cursor: pointer;
      font-size: 15px; padding: 3px 5px; border-radius: 8px;
      transition: background 0.1s;
      line-height: 1;
    }
    .msg-action-btn:hover { background: var(--ios-fill); }

    /* ── REPLY PREVIEW (above bubble) ── */
    .reply-preview {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px; padding: 5px 10px;
      background: var(--ios-fill2);
      border-left: 2px solid var(--ios-blue);
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      max-width: 75%;
    }
    .reply-preview-author { font-size: 12px; font-weight: 600; color: var(--ios-blue); }
    .reply-preview-text { font-size: 12px; color: var(--ios-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

    /* ── REPLY INPUT BAR ── */
    #replyBar {
      display: none; align-items: center; gap: 10px;
      padding: 8px 16px 4px;
      background: var(--ios-fill2);
      border-top: 1px solid var(--ios-sep);
      font-size: 13px; color: var(--ios-gray);
    }
    #replyBar.open { display: flex; }
    #replyBar strong { color: var(--ios-blue); }
    #cancelReply {
      margin-left: auto; background: none; border: none;
      font-size: 18px; color: var(--ios-gray); cursor: pointer; line-height: 1;
    }

    /* ── EMOJI REACTIONS ── */
    .reactions-row {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: 4px; max-width: 75%;
    }
    .reaction-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--ios-fill2);
      border: 1px solid var(--ios-sep);
      border-radius: 12px; padding: 3px 8px;
      font-size: 13px; cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      user-select: none;
    }
    .reaction-chip:hover { background: var(--ios-fill); }
    .reaction-chip.mine { background: rgba(0,122,255,0.1); border-color: rgba(0,122,255,0.3); }
    .reaction-chip .r-count { font-size: 12px; font-weight: 600; color: var(--ios-label2); }

    /* ── EMOJI PICKER ── */
    .emoji-picker {
      position: absolute; right: 16px; top: -52px;
      background: var(--ios-bg2);
      border: 1px solid var(--ios-sep);
      border-radius: 16px;
      padding: 8px 10px;
      display: none; gap: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 20;
    }
    .emoji-picker.open { display: flex; }
    .ep-btn {
      background: none; border: none; cursor: pointer;
      font-size: 20px; padding: 4px 6px; border-radius: 8px;
      transition: background 0.1s; line-height: 1;
    }
    .ep-btn:hover { background: var(--ios-fill); }

    /* ── PINNED BADGE ── */
    .pinned-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--ios-gray); margin-bottom: 2px;
    }

    /* ── PINNED BANNER ── */
    #pinnedBanner {
      display: none; align-items: center; gap: 10px;
      padding: 8px 16px;
      background: rgba(255,204,0,0.1);
      border-bottom: 1px solid rgba(255,204,0,0.3);
      font-size: 13px; color: var(--ios-label2);
      cursor: pointer; flex-shrink: 0;
    }
    #pinnedBanner.show { display: flex; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(44,44,46,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: white;
      padding: 11px 22px; border-radius: 22px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loadingScreen">
    <div class="spinner"></div>
    <div style="color:var(--ios-gray);font-size:14px;font-family:-apple-system,sans-serif;">Connecting to UFIIN…</div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- App -->
  <div id="app">

    <!-- Server List -->
    <div class="server-list">
      <div class="server-icon active" title="UFIIN Community" style="padding:0;overflow:hidden;background:transparent;">
        <svg width="48" height="48" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="49" fill="#6b2062"/>
          <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
          <defs><path id="ring-a" d="M 10,50 a 40,40 0 1,1 80,0 a 40,40 0 1,1 -80,0"/></defs>
          <text font-family="'Inter',sans-serif" font-size="5" font-weight="700" fill="rgba(255,255,255,0.8)" letter-spacing="1.5">
            <textPath href="#ring-a" startOffset="24%">✦ UNIVERSITY FEMALE INVESTORS INT'L NETWORK</textPath>
          </text>
          <text x="50" y="47" text-anchor="middle" font-family="'Inter',sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="2">UFIIN</text>
          <text x="50" y="59" text-anchor="middle" font-family="Georgia,serif" font-size="5.5" font-style="italic" fill="rgba(255,255,255,0.7)">strength in numbers</text>
        </svg>
      </div>
      <div class="server-divider"></div>
      <div class="server-icon server-icon-add" id="addChannelBtn" title="Add a channel">+</div>
    </div>

    <!-- Channel Panel -->
    <div class="channel-panel">
      <div class="server-header">
        <span>UFIIN Community</span>
        <span style="font-size:20px;color:var(--text3);line-height:1;">⌄</span>
      </div>
      <div class="channels-scroll" id="channelsScroll"></div>
      <div class="user-panel">
        <div class="avatar" id="userAvatar" style="width:32px;height:32px;font-size:13px;">
          <div class="online-dot"></div>
        </div>
        <div class="user-info">
          <div class="user-name" id="userName">…</div>
          <div class="user-status">Online</div>
        </div>
        <button class="icon-btn" id="signOutBtn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header">
        <span class="chat-hash">#</span>
        <span class="chat-name" id="chatName">general</span>
        <div class="chat-sep"></div>
        <span class="chat-desc" id="chatDesc"></span>
      </div>

      <!-- Pinned message banner -->
      <div id="pinnedBanner">
        <span>📌</span>
        <span id="pinnedText">Pinned message</span>
        <span style="margin-left:auto;font-size:11px;color:var(--ios-gray);">Click to view</span>
      </div>

      <div class="messages-wrap" id="messagesWrap">
        <div class="msg-spacer"></div>
        <div class="channel-welcome" id="channelWelcome">
          <div class="welcome-icon">#</div>
          <div class="welcome-title" id="welcomeTitle">Welcome to #general!</div>
          <div class="welcome-sub" id="welcomeSub">This is the start of the #general channel.</div>
        </div>
      </div>

      <!-- Reply bar -->
      <div id="replyBar">
        <span>↩ Replying to <strong id="replyToName"></strong></span>
        <button id="cancelReply" title="Cancel reply">✕</button>
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea
            id="msgInput"
            placeholder="Message #general"
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" title="Send (Enter)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Member List -->
    <div class="member-list">
      <div class="member-section-title" style="margin-bottom:8px;">
        Online — <span id="onlineCount">0</span>
      </div>
      <div id="memberItems"></div>
    </div>

  </div><!-- #app -->

  <!-- Add Channel Modal -->
  <div class="modal-overlay" id="addChannelModal">
    <div class="modal">
      <div class="modal-title">Create a Channel</div>
      <div class="modal-sub">Channels are where the community comes together. Give yours a clear, lowercase name.</div>
      <label class="modal-label" for="newChannelName">Channel Name</label>
      <input class="modal-input" id="newChannelName" type="text" placeholder="e.g. investing-tips" maxlength="40" autocomplete="off">
      <label class="modal-label" for="newChannelCategory">Category</label>
      <input class="modal-input" id="newChannelCategory" type="text" placeholder="Text Channels" maxlength="40" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="cancelChannelBtn">Cancel</button>
        <button class="modal-btn modal-btn-create" id="confirmChannelBtn">Create Channel</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION — Replace with your Supabase project details
    // ============================================================
    const SUPABASE_URL = 'https://deegqrsblgcbvdatuaid.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_ux0RP7LLcrMFsJhL3AXwkA_C-92Zrh9'
    // ============================================================

    const { createClient } = supabase
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ── State ──
    let currentUser    = null
    let currentProfile = null
    let currentChannel = null
    let channels       = []
    let messages       = []
    let onlineUsers    = new Map()
    let msgSub         = null
    let presenceCh     = null
    let reactionsSub   = null
    let reactionsCache = {}   // msgId → [{emoji, users:[]}]
    let replyingTo     = null // {id, author, content}
    let pinnedMessages = []

    // ── Avatar helpers ──
    const COLORS = ['#381d92','#7a00df','#0693e3','#cf2e2e','#ff6900','#00d084','#fcb900','#9b51e0']

    function avatarColor(userId) {
      const n = [...userId].reduce((a, c) => a + c.charCodeAt(0), 0)
      return COLORS[n % COLORS.length]
    }

    function initials(name) {
      if (!name) return '?'
      return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2)
    }

    // ── Time helpers ──
    function fmtTime(iso) {
      const d = new Date(iso), now = new Date()
      const h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0')
      const ampm = h >= 12 ? 'PM' : 'AM'
      const h12 = h % 12 || 12
      const today = d.toDateString() === now.toDateString()
      const yest = (() => { const y = new Date(now); y.setDate(y.getDate()-1); return y.toDateString() })()
      const prefix = today ? 'Today' : d.toDateString() === yest ? 'Yesterday' : d.toLocaleDateString()
      return `${prefix} at ${h12}:${m} ${ampm}`
    }

    function fmtDate(iso) {
      const d = new Date(iso), now = new Date()
      if (d.toDateString() === now.toDateString()) return 'Today'
      const yest = new Date(now); yest.setDate(yest.getDate() - 1)
      if (d.toDateString() === yest.toDateString()) return 'Yesterday'
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
    }

    function escHtml(s) {
      const d = document.createElement('div')
      d.appendChild(document.createTextNode(s))
      return d.innerHTML
    }

    // ── Toast ──
    let toastTimer
    function showToast(msg) {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.classList.add('show')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
    }

    // ── INIT ──
    async function init() {
      const { data: { session }, error } = await sb.auth.getSession()
      if (!session) {
        window.location.href = 'login.html'
        return
      }
      currentUser = session.user

      await loadProfile()
      await loadChannels()
      setupPresence()

      document.getElementById('loadingScreen').style.display = 'none'
      document.getElementById('app').classList.add('visible')
    }

    // ── Profile ──
    async function loadProfile() {
      const { data } = await sb
        .from('profiles').select('*')
        .eq('id', currentUser.id).single()

      if (data) {
        currentProfile = data
      } else {
        const username = currentUser.email?.split('@')[0] || 'user'
        const { data: np } = await sb
          .from('profiles')
          .upsert({ id: currentUser.id, username })
          .select().single()
        currentProfile = np || { id: currentUser.id, username }
      }

      const color = avatarColor(currentUser.id)
      const ini   = initials(currentProfile?.username)
      const av    = document.getElementById('userAvatar')
      av.style.background = color
      av.innerHTML = `${ini}<div class="online-dot"></div>`
      document.getElementById('userName').textContent = currentProfile?.username || currentUser.email
    }

    // ── Channels ──
    async function loadChannels() {
      const { data } = await sb.from('channels').select('*').order('position')
      channels = data || []
      renderChannels()
      if (channels.length > 0) await selectChannel(channels[0])
    }

    function renderChannels() {
      const wrap = document.getElementById('channelsScroll')
      const cats = {}
      channels.forEach(ch => {
        if (!cats[ch.category]) cats[ch.category] = []
        cats[ch.category].push(ch)
      })

      wrap.innerHTML = ''
      for (const [cat, chs] of Object.entries(cats)) {
        const catEl = document.createElement('div')
        catEl.className = 'ch-category'
        catEl.innerHTML = `<span>${cat}</span><button class="add-ch-btn" title="Add channel to ${cat}">+</button>`
        catEl.querySelector('.add-ch-btn').addEventListener('click', e => {
          e.stopPropagation()
          openAddChannelModal(cat)
        })
        wrap.appendChild(catEl)

        chs.forEach(ch => {
          const el = document.createElement('div')
          el.className = 'ch-item' + (currentChannel?.id === ch.id ? ' active' : '')
          el.dataset.id = ch.id
          el.innerHTML = `<span class="ch-hash">#</span><span>${escHtml(ch.name)}</span>`
          el.addEventListener('click', () => selectChannel(ch))
          wrap.appendChild(el)
        })
      }
    }

    async function selectChannel(ch) {
      currentChannel = ch
      renderChannels()

      document.getElementById('chatName').textContent = ch.name
      document.getElementById('chatDesc').textContent = ch.description || ''
      document.getElementById('msgInput').placeholder = `Message #${ch.name}`
      document.getElementById('welcomeTitle').textContent = `Welcome to #${ch.name}!`
      document.getElementById('welcomeSub').textContent = `This is the start of the #${ch.name} channel.`

      await loadMessages()
      await loadPinnedMessages()
      await loadReactions()

      // Resubscribe
      if (msgSub) { await sb.removeChannel(msgSub); msgSub = null }
      subscribeMessages()
      subscribeReactions()

      // Clear any active reply
      replyingTo = null
      document.getElementById('replyBar').classList.remove('open')
    }

    // ── Messages ──
    async function loadMessages() {
      const wrap = document.getElementById('messagesWrap')

      // Reset
      wrap.innerHTML = `
        <div class="msg-spacer"></div>
        <div class="channel-welcome" id="channelWelcome">
          <div class="welcome-icon">#</div>
          <div class="welcome-title" id="welcomeTitle">Welcome to #${escHtml(currentChannel.name)}!</div>
          <div class="welcome-sub" id="welcomeSub">This is the start of the #${escHtml(currentChannel.name)} channel.</div>
        </div>
      `

      const { data } = await sb
        .from('messages')
        .select('*, profiles(*)')
        .eq('channel_id', currentChannel.id)
        .order('created_at', { ascending: true })
        .limit(100)

      messages = data || []
      // Enrich reply_to context from already-loaded messages
      const msgMap = {}
      messages.forEach(m => { msgMap[m.id] = m })
      messages.forEach(m => {
        if (m.reply_to_id && msgMap[m.reply_to_id]) {
          const parent = msgMap[m.reply_to_id]
          m.reply_to_author = parent.profiles?.username || 'Unknown'
          m.reply_to_content = parent.content
        }
      })
      renderAllMessages()
    }

    function renderAllMessages() {
      const wrap = document.getElementById('messagesWrap')
      // Remove non-welcome nodes
      Array.from(wrap.children).forEach(c => {
        if (!c.classList.contains('msg-spacer') && !c.classList.contains('channel-welcome')) c.remove()
      })

      let lastDate = null, lastUser = null, lastTime = null

      messages.forEach(msg => {
        const d = fmtDate(msg.created_at)
        if (d !== lastDate) {
          if (lastDate !== null) wrap.appendChild(mkDateSep(d))
          lastDate = d
          lastUser = null
        }
        const timeDiff = lastTime ? (new Date(msg.created_at) - new Date(lastTime)) / 60000 : 999
        const grouped = lastUser === msg.user_id && timeDiff < 5
        wrap.appendChild(mkMsgEl(msg, !grouped))
        lastUser = msg.user_id
        lastTime = msg.created_at
      })

      scrollBottom()
    }

    function mkDateSep(label) {
      const el = document.createElement('div')
      el.className = 'date-sep'
      el.innerHTML = `
        <div class="date-sep-line"></div>
        <div class="date-sep-text">${label}</div>
        <div class="date-sep-line"></div>
      `
      return el
    }

    // ── @mention parser ──
    function parseMentions(text) {
      const safe = escHtml(text)
      return safe
        .replace(/@(everyone|here)/g, '<span class="mention mention-everyone">@$1</span>')
        .replace(/@(\w+)/g, '<span class="mention">@$1</span>')
    }

    // ── Render reactions for a message ──
    function renderReactions(msgId, bodyEl) {
      let row = bodyEl.querySelector('.reactions-row')
      const rxns = reactionsCache[msgId] || []
      if (!rxns.length) { if (row) row.remove(); return }
      if (!row) { row = document.createElement('div'); row.className = 'reactions-row'; bodyEl.appendChild(row) }
      row.innerHTML = rxns.map(r => {
        const mine = r.users.includes(currentUser.id)
        return `<button class="reaction-chip${mine?' mine':''}" data-emoji="${escHtml(r.emoji)}" data-msgid="${msgId}">
          ${r.emoji} <span class="r-count">${r.users.length}</span>
        </button>`
      }).join('')
      row.querySelectorAll('.reaction-chip').forEach(btn => {
        btn.addEventListener('click', () => toggleReaction(btn.dataset.msgid, btn.dataset.emoji))
      })
    }

    function mkMsgEl(msg, showAvatar) {
      const el = document.createElement('div')
      el.className = 'msg-group' + (showAvatar ? ' with-avatar' : '')
      el.dataset.msgId = msg.id

      const author  = msg.profiles?.username || 'Unknown'
      const color   = avatarColor(msg.user_id)
      const ini     = initials(author)
      const isPinned = pinnedMessages.some(p => p.message_id === msg.id)
      const replyMsg = msg.reply_to_content ? `
        <div class="reply-preview" data-jumpto="${escHtml(msg.reply_to_id||'')}">
          <div>
            <div class="reply-preview-author">↩ ${escHtml(msg.reply_to_author||'')}</div>
            <div class="reply-preview-text">${escHtml(msg.reply_to_content)}</div>
          </div>
        </div>` : ''

      const actionsHtml = `
        <div class="msg-actions">
          <div class="emoji-picker" id="ep-${msg.id}">
            ${['👍','❤️','😂','🔥','😮','👏'].map(e=>`<button class="ep-btn" data-emoji="${e}" data-msgid="${msg.id}">${e}</button>`).join('')}
          </div>
          <button class="msg-action-btn" title="React" onclick="toggleEmojiPicker('${msg.id}')">😊</button>
          <button class="msg-action-btn" title="Reply" onclick="startReply('${msg.id}','${escHtml(author)}')">↩</button>
          <button class="msg-action-btn" title="${isPinned?'Unpin':'Pin'}" onclick="togglePin('${msg.id}')">📌</button>
        </div>`

      if (showAvatar) {
        el.innerHTML = `
          ${actionsHtml}
          <div class="msg-avatar" style="background:${color};">${ini}</div>
          <div class="msg-body">
            ${isPinned ? '<div class="pinned-badge">📌 Pinned</div>' : ''}
            <div class="msg-header">
              <span class="msg-author" style="color:${color};">${escHtml(author)}</span>
              <span class="msg-time">${fmtTime(msg.created_at)}</span>
            </div>
            ${replyMsg}
            <div class="msg-text">${parseMentions(msg.content)}</div>
          </div>
        `
      } else {
        el.innerHTML = `
          ${actionsHtml}
          <div class="msg-avatar-gap"></div>
          <div class="msg-body">
            ${replyMsg}
            <div class="msg-text">${parseMentions(msg.content)}</div>
          </div>
        `
      }

      // Wire up emoji picker buttons
      el.querySelectorAll('.ep-btn').forEach(btn => {
        btn.addEventListener('click', () => { toggleReaction(btn.dataset.msgid, btn.dataset.emoji); closeAllPickers() })
      })

      // Wire up reply-preview jump
      el.querySelectorAll('.reply-preview').forEach(rp => {
        rp.addEventListener('click', () => {
          const target = document.querySelector(`[data-msg-id="${rp.dataset.jumpto}"]`)
          if (target) { target.scrollIntoView({ behavior:'smooth', block:'center' }); target.style.background='rgba(0,122,255,0.08)'; setTimeout(()=>target.style.background='',1200) }
        })
      })

      renderReactions(msg.id, el.querySelector('.msg-body'))
      return el
    }

    function appendMsg(msg) {
      const wrap = document.getElementById('messagesWrap')
      const prev = messages[messages.length - 2]
      const timeDiff = prev ? (new Date(msg.created_at) - new Date(prev.created_at)) / 60000 : 999
      const showAvatar = !prev || prev.user_id !== msg.user_id || timeDiff >= 5
      wrap.appendChild(mkMsgEl(msg, showAvatar))
      scrollBottom()
    }

    function scrollBottom() {
      const wrap = document.getElementById('messagesWrap')
      wrap.scrollTop = wrap.scrollHeight
    }

    // ── Emoji picker toggle ──
    function closeAllPickers() {
      document.querySelectorAll('.emoji-picker.open').forEach(p => p.classList.remove('open'))
    }
    function toggleEmojiPicker(msgId) {
      const picker = document.getElementById('ep-' + msgId)
      if (!picker) return
      const wasOpen = picker.classList.contains('open')
      closeAllPickers()
      if (!wasOpen) picker.classList.add('open')
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('.msg-actions')) closeAllPickers()
    })

    // ── Reactions ──
    async function loadReactions() {
      reactionsCache = {}
      const { data } = await sb
        .from('message_reactions')
        .select('message_id, emoji, user_id')
        .in('message_id', messages.map(m => m.id))
      if (!data) return
      data.forEach(r => {
        if (!reactionsCache[r.message_id]) reactionsCache[r.message_id] = []
        let entry = reactionsCache[r.message_id].find(e => e.emoji === r.emoji)
        if (!entry) { entry = { emoji: r.emoji, users: [] }; reactionsCache[r.message_id].push(entry) }
        entry.users.push(r.user_id)
      })
      // Re-render reactions on visible messages
      messages.forEach(m => {
        const el = document.querySelector(`[data-msg-id="${m.id}"] .msg-body`)
        if (el) renderReactions(m.id, el)
      })
    }

    async function toggleReaction(msgId, emoji) {
      if (!reactionsCache[msgId]) reactionsCache[msgId] = []
      const entry = reactionsCache[msgId].find(e => e.emoji === emoji)
      const alreadyReacted = entry?.users.includes(currentUser.id)

      if (alreadyReacted) {
        entry.users = entry.users.filter(u => u !== currentUser.id)
        if (!entry.users.length) reactionsCache[msgId] = reactionsCache[msgId].filter(e => e.emoji !== emoji)
        await sb.from('message_reactions').delete()
          .eq('message_id', msgId).eq('emoji', emoji).eq('user_id', currentUser.id)
      } else {
        if (!entry) reactionsCache[msgId].push({ emoji, users: [currentUser.id] })
        else entry.users.push(currentUser.id)
        await sb.from('message_reactions').upsert({ message_id: msgId, emoji, user_id: currentUser.id })
      }
      const bodyEl = document.querySelector(`[data-msg-id="${msgId}"] .msg-body`)
      if (bodyEl) renderReactions(msgId, bodyEl)
    }

    function subscribeReactions() {
      if (reactionsSub) sb.removeChannel(reactionsSub)
      reactionsSub = sb.channel(`reactions:${currentChannel.id}`)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'message_reactions' },
          () => loadReactions())
        .subscribe()
    }

    // ── Reply ──
    function startReply(msgId, authorName) {
      const msg = messages.find(m => m.id == msgId)
      if (!msg) return
      replyingTo = { id: msgId, author: authorName, content: msg.content }
      document.getElementById('replyToName').textContent = authorName
      document.getElementById('replyBar').classList.add('open')
      document.getElementById('msgInput').focus()
    }

    document.getElementById('cancelReply').addEventListener('click', () => {
      replyingTo = null
      document.getElementById('replyBar').classList.remove('open')
    })

    // ── Pin / Unpin ──
    async function loadPinnedMessages() {
      const { data } = await sb.from('pinned_messages')
        .select('*, messages(content, profiles(username))')
        .eq('channel_id', currentChannel.id)
        .order('created_at', { ascending: false })
        .limit(1)
      pinnedMessages = data || []
      const banner = document.getElementById('pinnedBanner')
      if (pinnedMessages.length) {
        const pin = pinnedMessages[0]
        const preview = pin.messages?.content?.slice(0, 60) || 'View pinned'
        document.getElementById('pinnedText').textContent = `"${preview}${preview.length>=60?'…':''}"`
        banner.classList.add('show')
      } else {
        banner.classList.remove('show')
      }
    }

    async function togglePin(msgId) {
      const isAlreadyPinned = pinnedMessages.some(p => p.message_id === msgId)
      if (isAlreadyPinned) {
        await sb.from('pinned_messages').delete().eq('message_id', msgId)
        showToast('Message unpinned')
      } else {
        await sb.from('pinned_messages').insert({ message_id: msgId, channel_id: currentChannel.id, pinned_by: currentUser.id })
        showToast('Message pinned 📌')
      }
      await loadPinnedMessages()
      renderAllMessages()
    }

    document.getElementById('pinnedBanner').addEventListener('click', () => {
      if (pinnedMessages.length) {
        const pin = pinnedMessages[0]
        const target = document.querySelector(`[data-msg-id="${pin.message_id}"]`)
        if (target) { target.scrollIntoView({ behavior:'smooth', block:'center' }); target.style.background='rgba(255,204,0,0.15)'; setTimeout(()=>target.style.background='',1400) }
      }
    })

    // ── Realtime messages ──
    function subscribeMessages() {
      msgSub = sb
        .channel(`msgs:${currentChannel.id}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: `channel_id=eq.${currentChannel.id}`
        }, async ({ new: raw }) => {
          if (messages.find(m => m.id === raw.id)) return
          const { data } = await sb
            .from('messages').select('*, profiles(*)')
            .eq('id', raw.id).single()
          if (data) {
            // Enrich with reply context if needed
            if (data.reply_to_id) {
              const parent = messages.find(m => m.id === data.reply_to_id)
              if (parent) {
                data.reply_to_author = parent.profiles?.username || 'Unknown'
                data.reply_to_content = parent.content
              }
            }
            messages.push(data); appendMsg(data)
          }
        })
        .subscribe()
    }

    // ── Send message ──
    async function sendMessage() {
      const input = document.getElementById('msgInput')
      const content = input.value.trim()
      if (!content || !currentChannel) return

      input.value = ''
      autoResize(input)

      // Capture and clear reply state
      const replyRef = replyingTo
      replyingTo = null
      document.getElementById('replyBar').classList.remove('open')

      // Optimistic UI
      const tempId  = 'temp-' + Date.now()
      const tempMsg = {
        id: tempId, channel_id: currentChannel.id,
        user_id: currentUser.id, content,
        created_at: new Date().toISOString(),
        profiles: currentProfile,
        reply_to_id: replyRef?.id || null,
        reply_to_author: replyRef?.author || null,
        reply_to_content: replyRef?.content || null
      }
      messages.push(tempMsg)
      appendMsg(tempMsg)

      const insertData = { channel_id: currentChannel.id, user_id: currentUser.id, content }
      if (replyRef) insertData.reply_to_id = replyRef.id

      const { data, error } = await sb
        .from('messages')
        .insert(insertData)
        .select('*, profiles(*)').single()

      if (error) {
        showToast('Failed to send message.')
        messages = messages.filter(m => m.id !== tempId)
        document.querySelector(`[data-msg-id="${tempId}"]`)?.remove()
        return
      }

      // Swap temp → real
      const tempEl = document.querySelector(`[data-msg-id="${tempId}"]`)
      if (tempEl) tempEl.dataset.msgId = data.id
      messages = messages.map(m => m.id === tempId ? data : m)
    }

    // ── Presence ──
    function setupPresence() {
      presenceCh = sb.channel('ufiin:presence:v1')

      presenceCh
        .on('presence', { event: 'sync' }, () => {
          onlineUsers.clear()
          const state = presenceCh.presenceState()
          Object.values(state).forEach(arr => arr.forEach(p => onlineUsers.set(p.user_id, p)))
          renderMembers()
        })
        .on('presence', { event: 'join' }, ({ newPresences }) => {
          newPresences.forEach(p => onlineUsers.set(p.user_id, p))
          renderMembers()
        })
        .on('presence', { event: 'leave' }, ({ leftPresences }) => {
          leftPresences.forEach(p => onlineUsers.delete(p.user_id))
          renderMembers()
        })
        .subscribe(async status => {
          if (status === 'SUBSCRIBED') {
            await presenceCh.track({
              user_id:   currentUser.id,
              username:  currentProfile?.username || currentUser.email,
              online_at: new Date().toISOString()
            })
          }
        })
    }

    function renderMembers() {
      const container = document.getElementById('memberItems')
      const count = document.getElementById('onlineCount')
      const users = [...onlineUsers.values()]
      count.textContent = users.length

      // Sort: current user first, then alphabetical
      users.sort((a, b) => {
        if (a.user_id === currentUser.id) return -1
        if (b.user_id === currentUser.id) return 1
        return (a.username || '').localeCompare(b.username || '')
      })

      container.innerHTML = users.map(u => {
        const color = avatarColor(u.user_id)
        const ini   = initials(u.username)
        const isMe  = u.user_id === currentUser.id
        return `
          <div class="member-item">
            <div class="avatar" style="background:${color};width:32px;height:32px;font-size:13px;">
              ${ini}<div class="online-dot"></div>
            </div>
            <div class="member-name${isMe ? ' is-me' : ''}">${escHtml(u.username || 'Unknown')}${isMe ? ' (you)' : ''}</div>
          </div>
        `
      }).join('')
    }

    // ── Input auto-resize ──
    function autoResize(el) {
      el.style.height = 'auto'
      el.style.height = Math.min(el.scrollHeight, 160) + 'px'
    }

    // ── Event listeners ──
    document.getElementById('msgInput').addEventListener('input', function() {
      autoResize(this)
    })

    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        sendMessage()
      }
    })

    document.getElementById('sendBtn').addEventListener('click', sendMessage)

    document.getElementById('signOutBtn').addEventListener('click', async () => {
      if (confirm('Sign out of UFIIN Community?')) {
        if (presenceCh) await sb.removeChannel(presenceCh)
        await sb.auth.signOut()
        window.location.href = 'login.html'
      }
    })

    // ── Add Channel Modal ──
    function openAddChannelModal(presetCategory = '') {
      document.getElementById('newChannelName').value = ''
      document.getElementById('newChannelCategory').value = presetCategory
      document.getElementById('addChannelModal').classList.add('open')
      setTimeout(() => document.getElementById('newChannelName').focus(), 60)
    }

    document.getElementById('addChannelBtn').addEventListener('click', () => openAddChannelModal())

    document.getElementById('cancelChannelBtn').addEventListener('click', () => {
      document.getElementById('addChannelModal').classList.remove('open')
    })

    document.getElementById('addChannelModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open')
    })

    document.getElementById('newChannelName').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('confirmChannelBtn').click()
      if (e.key === 'Escape') document.getElementById('cancelChannelBtn').click()
    })

    document.getElementById('confirmChannelBtn').addEventListener('click', async () => {
      const raw = document.getElementById('newChannelName').value.trim()
      if (!raw) { document.getElementById('newChannelName').focus(); return }
      const name = raw.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '')
      if (!name) { showToast('Please use letters, numbers, or hyphens'); return }
      const category = document.getElementById('newChannelCategory').value.trim() || 'Text Channels'

      const btn = document.getElementById('confirmChannelBtn')
      btn.textContent = 'Creating…'
      btn.disabled = true

      const { data, error } = await sb.from('channels').insert({
        name, category, position: channels.length, description: ''
      }).select().single()

      btn.textContent = 'Create Channel'
      btn.disabled = false

      if (error) { showToast('Could not create channel — check permissions'); return }

      document.getElementById('addChannelModal').classList.remove('open')
      channels.push(data)
      renderChannels()
      await selectChannel(data)
    })

    // ── Start ──
    init()
  </script>
</body>
</html>
