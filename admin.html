<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFIIN — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dp: #4D1840; --mp: #8C3085; --pk: #D99AC6; --pl: #fdf0f9;
      --bg: #f5f5f7; --white: #fff;
      --sep: rgba(0,0,0,0.08);
      --green: #34c759; --red: #ff3b30; --blue: #007AFF; --orange: #ff9500;
      --gray: #8e8e93; --gray2: #f2f2f7;
    }
    body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg); color: #1c1c1e; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ── PASSWORD SCREEN ── */
    #passwordScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--dp);
    }
    .pw-card {
      background: white; border-radius: 20px; padding: 40px 36px;
      width: 360px; max-width: calc(100vw - 40px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      text-align: center;
    }
    .pw-card img { height: 64px; margin: 0 auto 20px; }
    .pw-card h2 { font-size: 20px; font-weight: 700; color: var(--dp); margin-bottom: 6px; }
    .pw-card p { font-size: 14px; color: var(--gray); margin-bottom: 24px; }
    .pw-input {
      width: 100%; border: 1.5px solid rgba(77,24,64,0.2); border-radius: 10px;
      padding: 12px 16px; font-size: 16px; color: var(--dp);
      text-align: center; letter-spacing: 4px; outline: none;
      transition: border-color 0.15s; margin-bottom: 12px;
      font-family: -apple-system, sans-serif;
    }
    .pw-input:focus { border-color: var(--mp); }
    .pw-btn {
      width: 100%; padding: 13px; border: none; border-radius: 100px;
      background: var(--mp); color: white; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .pw-btn:hover { background: var(--dp); }
    .pw-error { font-size: 13px; color: var(--red); margin-top: 10px; display: none; }
    .pw-error.show { display: block; }

    /* ── NAV ── */
    #dashboard { display: none; }
    nav { background: var(--dp); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-left img { height: 36px; filter: brightness(0) invert(1); }
    .nav-title { font-size: 16px; font-weight: 700; color: white; letter-spacing: -0.3px; }
    .admin-badge { background: var(--pk); color: var(--dp); font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.05em; }
    .sign-out-btn { background: rgba(255,255,255,0.12); border: none; color: white; font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
    .sign-out-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── LAYOUT ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    @media (max-width: 700px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    .stat-card { background: var(--white); border-radius: 14px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-label { font-size: 12px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .stat-num { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .stat-edu { color: var(--blue); }
    .stat-nonedu { color: var(--orange); }
    .stat-accepted { color: var(--green); }
    .stat-denied { color: var(--red); }

    /* ── SECTION TABS ── */
    .section-tabs { display: flex; gap: 4px; background: var(--gray2); padding: 4px; border-radius: 12px; margin-bottom: 24px; width: fit-content; }
    .section-tab { padding: 9px 20px; border: none; background: none; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--gray); transition: background 0.15s, color 0.15s; }
    .section-tab.active { background: var(--white); color: #1c1c1e; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    /* ── QUEUE PANELS ── */
    .queue-panel { display: none; }
    .queue-panel.active { display: block; }
    .queue-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 700px) { .queue-cols { grid-template-columns: 1fr; } }
    .queue-col { background: var(--white); border-radius: 16px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .queue-col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--sep); }
    .queue-col-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-pending { background: var(--orange); }
    .dot-accepted { background: var(--green); }
    .dot-denied { background: var(--red); }
    .queue-count { font-size: 12px; font-weight: 700; background: var(--gray2); color: var(--gray); padding: 3px 9px; border-radius: 20px; }

    /* ── APPLICANT CARD ── */
    .applicant-card { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--sep); transition: opacity 0.2s; }
    .applicant-card:last-child { border-bottom: none; padding-bottom: 0; }
    .applicant-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: white; flex-shrink: 0; }
    .applicant-info { flex: 1; min-width: 0; }
    .applicant-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .applicant-email { font-size: 12px; color: var(--gray); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .applicant-time { font-size: 11px; color: var(--gray); margin-top: 2px; }
    .applicant-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn { border: none; border-radius: 8px; font-size: 12px; font-weight: 700; padding: 6px 12px; cursor: pointer; transition: opacity 0.15s; }
    .action-btn:hover { opacity: 0.75; }
    .btn-accept { background: rgba(52,199,89,0.12); color: var(--green); }
    .btn-deny { background: rgba(255,59,48,0.1); color: var(--red); }
    .btn-restore { background: rgba(0,122,255,0.1); color: var(--blue); }

    .empty-state { text-align: center; padding: 32px 16px; color: var(--gray); font-size: 13px; line-height: 1.6; }
    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(44,44,46,0.92); backdrop-filter: blur(12px);
      color: white; padding: 11px 22px; border-radius: 22px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Password Screen -->
<div id="passwordScreen">
  <div class="pw-card">
    <img src="https://ufiinsin.com/wp-content/uploads/2026/02/Logo-300x280.png" alt="UFIIN">
    <h2>Admin Access</h2>
    <p>Enter the admin password to continue</p>
    <input class="pw-input" type="password" id="pwInput" placeholder="••••••••" maxlength="20">
    <button class="pw-btn" onclick="checkPassword()">Enter Dashboard</button>
    <div class="pw-error" id="pwError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <nav>
    <div class="nav-left">
      <img src="https://ufiinsin.com/wp-content/uploads/2026/02/Logo-300x280.png" alt="UFIIN">
      <span class="nav-title">UFIIN</span>
      <span class="admin-badge">ADMIN</span>
    </div>
    <button class="sign-out-btn" onclick="signOut()">Sign out</button>
  </nav>

  <div class="container">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">EDU Pending</div>
        <div class="stat-num stat-edu" id="stat-edu">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Non-EDU Pending</div>
        <div class="stat-num stat-nonedu" id="stat-nonedu">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Accepted</div>
        <div class="stat-num stat-accepted" id="stat-accepted">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Denied</div>
        <div class="stat-num stat-denied" id="stat-denied">—</div>
      </div>
    </div>

    <!-- Section tabs -->
    <div class="section-tabs">
      <button class="section-tab active" onclick="switchSection('edu')">🎓 EDU Emails</button>
      <button class="section-tab" onclick="switchSection('nonedu')">🌐 Non-EDU Emails</button>
    </div>

    <!-- EDU Panel -->
    <div class="queue-panel active" id="panel-edu">
      <div class="queue-cols">
        <div class="queue-col">
          <div class="queue-col-header">
            <div class="queue-col-title"><span class="dot dot-pending"></span>Pending</div>
            <span class="queue-count" id="edu-pending-count">0</span>
          </div>
          <div id="edu-pending-list"></div>
        </div>
        <div class="queue-col">
          <div class="queue-col-header">
            <div class="queue-col-title"><span class="dot dot-accepted"></span>Accepted</div>
            <span class="queue-count" id="edu-accepted-count">0</span>
          </div>
          <div id="edu-accepted-list"></div>
        </div>
      </div>
      <div class="queue-col">
        <div class="queue-col-header">
          <div class="queue-col-title"><span class="dot dot-denied"></span>Denied</div>
          <span class="queue-count" id="edu-denied-count">0</span>
        </div>
        <div id="edu-denied-list"></div>
      </div>
    </div>

    <!-- Non-EDU Panel -->
    <div class="queue-panel" id="panel-nonedu">
      <div class="queue-cols">
        <div class="queue-col">
          <div class="queue-col-header">
            <div class="queue-col-title"><span class="dot dot-pending"></span>Pending</div>
            <span class="queue-count" id="nonedu-pending-count">0</span>
          </div>
          <div id="nonedu-pending-list"></div>
        </div>
        <div class="queue-col">
          <div class="queue-col-header">
            <div class="queue-col-title"><span class="dot dot-accepted"></span>Accepted</div>
            <span class="queue-count" id="nonedu-accepted-count">0</span>
          </div>
          <div id="nonedu-accepted-list"></div>
        </div>
      </div>
      <div class="queue-col">
        <div class="queue-col-header">
          <div class="queue-col-title"><span class="dot dot-denied"></span>Denied</div>
          <span class="queue-count" id="nonedu-denied-count">0</span>
        </div>
        <div id="nonedu-denied-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://deegqrsblgcbvdatuaid.supabase.co'
  const SUPABASE_ANON = 'sb_publishable_ux0RP7LLcrMFsJhL3AXwkA_C-92Zrh9'
  const ADMIN_PASSWORD = 'UFIIN123'
  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON)

  emailjs.init('DPmtrbyw-ap4Ayr7U')

  let allProfiles = []
  let toastTimer

  // ── Auth ──
  function checkPassword() {
    const val = document.getElementById('pwInput').value
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem('ufiin_admin', '1')
      document.getElementById('passwordScreen').style.display = 'none'
      document.getElementById('dashboard').style.display = 'block'
      loadAll()
    } else {
      document.getElementById('pwError').classList.add('show')
      document.getElementById('pwInput').value = ''
      document.getElementById('pwInput').focus()
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('passwordScreen').style.display !== 'none') checkPassword()
  })

  function signOut() {
    sessionStorage.removeItem('ufiin_admin')
    document.getElementById('dashboard').style.display = 'none'
    document.getElementById('passwordScreen').style.display = 'flex'
    document.getElementById('pwInput').value = ''
    document.getElementById('pwError').classList.remove('show')
  }

  // Auto-login if session exists
  if (sessionStorage.getItem('ufiin_admin') === '1') {
    document.getElementById('passwordScreen').style.display = 'none'
    document.getElementById('dashboard').style.display = 'block'
    loadAll()
  }

  // ── Data ──
  async function loadAll() {
    const { data, error } = await sb.from('profiles')
      .select('id, username, full_email, email_type, status, created_at')
      .order('created_at', { ascending: false })
    if (error) { showToast('Error loading profiles: ' + error.message); return }
    allProfiles = (data || []).filter(p => p.full_email) // only show users who signed up via form
    renderAll()
  }

  function renderAll() {
    const edu    = allProfiles.filter(p => p.email_type === 'edu')
    const nonEdu = allProfiles.filter(p => p.email_type !== 'edu')

    const ep = edu.filter(p => p.status === 'pending')
    const ea = edu.filter(p => p.status === 'accepted')
    const ed = edu.filter(p => p.status === 'denied')
    const np = nonEdu.filter(p => p.status === 'pending')
    const na = nonEdu.filter(p => p.status === 'accepted')
    const nd = nonEdu.filter(p => p.status === 'denied')

    document.getElementById('stat-edu').textContent     = ep.length
    document.getElementById('stat-nonedu').textContent  = np.length
    document.getElementById('stat-accepted').textContent= ea.length + na.length
    document.getElementById('stat-denied').textContent  = ed.length + nd.length

    document.getElementById('edu-pending-count').textContent    = ep.length
    document.getElementById('edu-accepted-count').textContent   = ea.length
    document.getElementById('edu-denied-count').textContent     = ed.length
    document.getElementById('nonedu-pending-count').textContent = np.length
    document.getElementById('nonedu-accepted-count').textContent= na.length
    document.getElementById('nonedu-denied-count').textContent  = nd.length

    renderList('edu-pending-list',    ep, 'pending')
    renderList('edu-accepted-list',   ea, 'accepted')
    renderList('edu-denied-list',     ed, 'denied')
    renderList('nonedu-pending-list', np, 'pending')
    renderList('nonedu-accepted-list',na, 'accepted')
    renderList('nonedu-denied-list',  nd, 'denied')
  }

  const COLORS = ['#381d92','#7a00df','#0693e3','#8C3085','#ff6900','#00d084','#fcb900','#9b51e0']
  function avatarColor(id) { const n = [...(id||'x')].reduce((a,c)=>a+c.charCodeAt(0),0); return COLORS[n%COLORS.length] }
  function initials(name) { if (!name) return '?'; return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2) }
  function fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) }
  function escHtml(s) { const d=document.createElement('div'); d.appendChild(document.createTextNode(s||'')); return d.innerHTML }

  function renderList(containerId, profiles, status) {
    const el = document.getElementById(containerId)
    if (!profiles.length) {
      const icons = { pending: '🎉', accepted: '📭', denied: '📭' }
      const msgs  = { pending: 'No pending applications', accepted: 'None yet', denied: 'None yet' }
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">${icons[status]}</div>${msgs[status]}</div>`
      return
    }
    el.innerHTML = profiles.map(p => {
      const color = avatarColor(p.id)
      const ini   = initials(p.username)
      let actions = ''
      if (status === 'pending') {
        actions = `
          <button class="action-btn btn-accept" onclick="updateStatus('${p.id}','accepted','${escHtml(p.full_email)}','${escHtml(p.username)}')">✓ Accept</button>
          <button class="action-btn btn-deny"   onclick="updateStatus('${p.id}','denied','${escHtml(p.full_email)}','${escHtml(p.username)}')">✕ Deny</button>`
      } else if (status === 'accepted') {
        actions = `<button class="action-btn btn-deny" onclick="updateStatus('${p.id}','denied','${escHtml(p.full_email)}','${escHtml(p.username)}')">Revoke</button>`
      } else {
        actions = `<button class="action-btn btn-restore" onclick="updateStatus('${p.id}','accepted','${escHtml(p.full_email)}','${escHtml(p.username)}')">Accept</button>`
      }
      return `
        <div class="applicant-card" id="card-${p.id}">
          <div class="applicant-avatar" style="background:${color};">${escHtml(ini)}</div>
          <div class="applicant-info">
            <div class="applicant-name">${escHtml(p.username||'Unknown')}</div>
            <div class="applicant-email">${escHtml(p.full_email||'—')}</div>
            <div class="applicant-time">Applied ${fmtDate(p.created_at)}</div>
          </div>
          <div class="applicant-actions">${actions}</div>
        </div>`
    }).join('')
  }

  async function updateStatus(userId, newStatus, email, username) {
    const card = document.getElementById('card-' + userId)
    if (card) card.style.opacity = '0.4'

    const { error } = await sb.from('profiles').update({ status: newStatus }).eq('id', userId)
    if (error) {
      showToast('Error: ' + error.message)
      if (card) card.style.opacity = '1'
      return
    }

    // Send email notification via EmailJS
    try {
      await emailjs.send('service_ncyfs8e', 'template_44oxop', {
        to_email: email,
        to_name: username || 'Member',
        status: newStatus === 'accepted' ? 'approved' : 'rejected'
      })
    } catch(e) { console.warn('EmailJS error:', e) }

    allProfiles = allProfiles.map(p => p.id === userId ? { ...p, status: newStatus } : p)
    renderAll()
    showToast(newStatus === 'accepted' ? '✅ Accepted — email sent' : '❌ Denied — email sent')
  }

  function switchSection(section) {
    document.querySelectorAll('.section-tab').forEach((t,i) => {
      t.classList.toggle('active', (section==='edu'&&i===0)||(section==='nonedu'&&i===1))
    })
    document.getElementById('panel-edu').classList.toggle('active', section==='edu')
    document.getElementById('panel-nonedu').classList.toggle('active', section==='nonedu')
  }

  function showToast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg; el.classList.add('show')
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
  }
</script>
</body>
</html>
